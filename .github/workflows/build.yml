name: Build ChainLock APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: android-actions/setup-android@v3
      - name: Arrange files
        run: |
          mkdir -p app/src/main/java/com/chainlock/app
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/xml
          mv MainActivity.kt app/src/main/java/com/chainlock/app/ 2>/dev/null || true
          mv ChainStorage.kt app/src/main/java/com/chainlock/app/ 2>/dev/null || true
          mv AccessibilityLockService.kt app/src/main/java/com/chainlock/app/ 2>/dev/null || true
          mv BlockScreenActivity.kt app/src/main/java/com/chainlock/app/ 2>/dev/null || true
          mv UsageTrackerService.kt app/src/main/java/com/chainlock/app/ 2>/dev/null || true
          mv BootReceiver.kt app/src/main/java/com/chainlock/app/ 2>/dev/null || true
          mv AndroidManifest.xml app/src/main/ 2>/dev/null || true
          mv styles.xml app/src/main/res/values/ 2>/dev/null || true
          mv accessibility_service_config.xml app/src/main/res/xml/ 2>/dev/null || true
          mv app_build.gradle app/build.gradle 2>/dev/null || true
      - name: Setup Gradle
        run: |
          mkdir -p gradle/wrapper
          echo "distributionBase=GRADLE_USER_HOME" > gradle/wrapper/gradle-wrapper.properties
          echo "distributionPath=wrapper/dists" >> gradle/wrapper/gradle-wrapper.properties
          echo "distributionUrl=https\://services.gradle.org/distributions/gradle-8.2-bin.zip" >> gradle/wrapper/gradle-wrapper.properties
          echo "zipStoreBase=GRADLE_USER_HOME" >> gradle/wrapper/gradle-wrapper.properties
          echo "zipStorePath=wrapper/dists" >> gradle/wrapper/gradle-wrapper.properties
          wget -q https://raw.githubusercontent.com/gradle/gradle/v8.2.0/gradlew -O gradlew
          wget -q https://raw.githubusercontent.com/gradle/gradle/v8.2.0/gradle/wrapper/gradle-wrapper.jar -O gradle/wrapper/gradle-wrapper.jar
          chmod +x gradlew
      - name: Build APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace
      - uses: actions/upload-artifact@v4
        with:
          name: ChainLock-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
